<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Jingbang Chen</title>
    <script>
      (function () {
        var location = window.location;
        var redirect =
          location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          "/?/" +
          location.pathname.slice(1).replace(/&/g, "~and~") +
          (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
          location.hash;

        location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
